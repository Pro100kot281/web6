<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFood Delivery | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">Food<span>Express</span></div>
        <div class="search-bar">
            <input type="text" placeholder="What are you craving?">
            <i class="fa fa-search"></i>
        </div>
        <nav class="user-menu">
            <a href="#"><i class="fa fa-user"></i> Login</a>
            <a href="#" class="cart-link"><i class="fa fa-shopping-cart"></i> Cart <span>2</span></a>
        </nav>
        <div class="mobile-toggle"><i class="fa fa-bars"></i></div>
    </header>

    <div class="hero-banner">
        <div class="hero-text">
            <h1>Very Fast Delivery</h1>
            <p>Your favorite food, delivered in 20 minutes.</p>
        </div>
    </div>

    <main class="main-container">
        <aside class="sidebar">
            <h3><i class="fa fa-list"></i> Categories</h3>
            <ul>
                <li><a href="#" class="active">Pizza</a></li>
                <li><a href="#">Sushi</a></li>
                <li><a href="#">Burgers</a></li>
                <li><a href="#">Drinks</a></li>
            </ul>
        </aside>

        <section class="products">
            <div class="product-grid">
                <div class="product-card">
                    <div class="img-box">Pizza</div>
                    <div class="info">
                        <h4>Pepperoni Feast</h4>
                        <p>$14.99</p>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="img-box">Sushi</div>
                    <div class="info">
                        <h4>California Roll</h4>
                        <p>$12.50</p>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="img-box">Drink</div>
                    <div class="info">
                        <h4>Fresh Lemonade</h4>
                        <p>$3.99</p>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 FoodExpress. All rights reserved.</p>
    </footer|
</body>
</html>
